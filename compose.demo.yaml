services:
  console-demo:
    build:
      context: .
      dockerfile: Dockerfile.demo
    ports:
      - "8000:8000"
    environment:
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_BITABLE_APP_TOKEN: ${FEISHU_BITABLE_APP_TOKEN:-}
      FEISHU_BITABLE_TABLE_ID: ${FEISHU_BITABLE_TABLE_ID:-}
      FEISHU_CUSTOMER_TABLE_ID: ${FEISHU_CUSTOMER_TABLE_ID:-}
      FEISHU_INTAKE_TABLE_ID: ${FEISHU_INTAKE_TABLE_ID:-}
      MESSAGE_WEBHOOK_URL: ${MESSAGE_WEBHOOK_URL:-}
    volumes:
      - demo_data:/app/backend/data
      - demo_uploads:/app/backend/storage/uploads

volumes:
  demo_data:
  demo_uploads:
